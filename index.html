<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minal Aidzin 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
    text-align: center;
    color: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    animation: fadeIn 1.5s ease;
}

h1 {
    animation: float 3s infinite ease-in-out;
}

/* TOMBOL */
button {
    padding: 15px 25px;
    border: none;
    border-radius: 15px;
    background: #ff2e63;
    color: white;
    font-size: 18px;
    cursor: pointer;
    animation: shake 2s infinite;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
    background: #ff0044;
}

/* TEXT PAP */
#papText {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
    opacity: 0;
    transform: translateY(20px);
    transition: 0.5s;
}

.show {
    opacity: 1 !important;
    transform: translateY(0) !important;
}

/* ANIMASI */
@keyframes fadeIn {
    from {opacity: 0; transform: scale(0.8);}
    to {opacity: 1; transform: scale(1);}
}

@keyframes float {
    0%,100% { transform: translateY(0);}
    50% { transform: translateY(-10px);}
}

@keyframes shake {
    0% { transform: rotate(0deg);}
    25% { transform: rotate(2deg);}
    50% { transform: rotate(-2deg);}
    75% { transform: rotate(2deg);}
    100% { transform: rotate(0deg);}
}

/* LOVE FALL */
.love {
    position: absolute;
    top: -20px;
    font-size: 20px;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="card">
    <h1>🌙 Minal Aidzin 💖</h1>

    <p>
        Mohon maaf lahir dan batin ya sayang 🤍<br>
        Kalau aku ada salah... maafin ya 🥺💞
    </p>

    <button onclick="mintaPap()">TEKAN INI SEKARANG 😳🔥</button>

    <div id="papText"></div>
</div>

<script>
function mintaPap() {
    const text = document.getElementById("papText");

    const pesan = [
        "🚨 WAJIB PAP SEKARANG!! 🚨<br>kalau engga aku ngambek 😤",
        "📸 Kirim pap cantik kamu dong!!<br>aku lagi kangen banget 😭💖",
        "😳 Pap lucu sekarang juga ya!!<br>biar maafnya sah 😏",
        "🔥 MAAF DITERIMA 🔥<br>tapi harus kirim pap dulu 😆",
        "💖 Aku maafin kamu...<br>tapi pap nya mana?? 😝"
    ];

    const random = pesan[Math.floor(Math.random() * pesan.length)];
    text.innerHTML = random;
    text.classList.add("show");
}

/* LOVE EFFECT */
setInterval(() => {
    const love = document.createElement("div");
    love.classList.add("love");
    love.innerHTML = "💖";

    love.style.left = Math.random() * 100 + "vw";
    love.style.animationDuration = (3 + Math.random() * 3) + "s";

    document.body.appendChild(love);

    setTimeout(() => {
        love.remove();
    }, 5000);
}, 300);
</script>

</body>
  </html>
